# Obelisk launch config for THEMIS — depth-camera ("scan") variant.
#
# Differs from themis_cpp.yaml in two ways:
#   * model_xml_path = themis_basic_scene.xml  (floating-base + floor, so the
#     depth camera has something to image).
#   * adds a depth_camera sensor publishing DepthImage on /obelisk/themis/depth,
#     attached to the `chest_camera` site on BASE_LINK (50° down-pitch).
#
# The `chest_camera` site is oriented in Obelisk depth-pattern convention
# (+X = optical axis, +Y = left, +Z = up), so the scan_config offset is identity.

config: themis_scan_example

control:
  - pkg: obelisk_westwood_cpp
    executable: themis_example_controller
    publishers:
      - ros_parameter: pub_ctrl_setting
        topic: /obelisk/themis/ctrl
        history_depth: 10
        callback_group: None
    subscribers:
      - ros_parameter: sub_est_setting
        topic: /obelisk/themis/est_state
        history_depth: 10
        callback_group: None
      # ----- Joystick (button X advances the swept joint index) ----- #
      - ros_parameter: joystick_sub_setting
        topic: /obelisk/themis/joy
    timers:
      - ros_parameter: timer_ctrl_setting
        timer_period_sec: 0.002      # 500 Hz
        callback_group: None

estimation:
  - pkg: obelisk_estimation_cpp
    executable: jointencoders_passthrough_estimator
    publishers:
      - ros_parameter: pub_est_setting
        topic: /obelisk/themis/est_state
        msg_type: EstimatedState
        history_depth: 10
        callback_group: None
    subscribers:
      - ros_parameter: sub_sensor_setting
        topic: /obelisk/themis/joint_encoders
        msg_type: ObkJointEncoders
        history_depth: 10
        callback_group: None
    timers:
      - ros_parameter: timer_est_setting
        timer_period_sec: 0.002      # 500 Hz
        callback_group: None

robot:
  - is_simulated: True
    pkg: obelisk_westwood_cpp
    executable: obelisk_themis_sim
    params:
      ic_keyframe: ic
    publishers:
      - ros_parameter: pub_sensor_setting
        topic: /obelisk/themis/joint_encoders
        history_depth: 10
      - ros_parameter: pub_imu_setting
        topic: /obelisk/themis/pelvis_imu
        history_depth: 10
    subscribers:
      - ros_parameter: sub_ctrl_setting
        topic: /obelisk/themis/ctrl
        history_depth: 10
        callback_group: None
      - ros_parameter: sub_fsm_setting
        topic: /obelisk/themis/exec_fsm
        history_depth: 10
        callback_group: None
      - ros_parameter: sub_vel_cmd_setting
        topic: /obelisk/themis/vel_cmd
        history_depth: 10
        callback_group: None
    sim:
      - ros_parameter: mujoco_setting
        n_u: 28
        time_step: 0.001
        num_steps_per_viz: 5
        robot_pkg: themis_description
        model_xml_path: themis_basic_scene.xml
        sensor_settings:
          # ---------- Chest depth camera ---------- #
          - topic: /obelisk/themis/depth
            dt: 0.033
            msg_type: DepthImage
            sensor_names:
              scan_pos_sensor: framepos
            scan_config:
              site_name: chest_camera
              geom_groups: [0, 1, 2]
              viz_decimation: 1
              frame: world
              pattern:
                type: depth_camera
                width: 30
                height: 26
                intrinsic_matrix: [25.9928, 0.0, 14.9936, 0.0, 27.8703, 12.9966, 0.0, 0.0, 1.0]
                offset:
                  pos: [0.0, 0.0, 0.0]
                  rot: [1.0, 0.0, 0.0, 0.0]   # identity — site already in depth-pattern convention
          # ---------- Joint encoders ---------- #
          - topic: /obelisk/themis/joint_encoders
            dt: 0.002
            msg_type: ObkJointEncoders
            sensor_names:
              # joint positions
              HIP_YAW_R_pos: jointpos
              HIP_ROLL_R_pos: jointpos
              HIP_PITCH_R_pos: jointpos
              KNEE_PITCH_R_pos: jointpos
              ANKLE_PITCH_R_pos: jointpos
              ANKLE_ROLL_R_pos: jointpos
              HIP_YAW_L_pos: jointpos
              HIP_ROLL_L_pos: jointpos
              HIP_PITCH_L_pos: jointpos
              KNEE_PITCH_L_pos: jointpos
              ANKLE_PITCH_L_pos: jointpos
              ANKLE_ROLL_L_pos: jointpos
              SHOULDER_PITCH_R_pos: jointpos
              SHOULDER_ROLL_R_pos: jointpos
              SHOULDER_YAW_R_pos: jointpos
              ELBOW_PITCH_R_pos: jointpos
              ELBOW_YAW_R_pos: jointpos
              WRIST_PITCH_R_pos: jointpos
              WRIST_YAW_R_pos: jointpos
              SHOULDER_PITCH_L_pos: jointpos
              SHOULDER_ROLL_L_pos: jointpos
              SHOULDER_YAW_L_pos: jointpos
              ELBOW_PITCH_L_pos: jointpos
              ELBOW_YAW_L_pos: jointpos
              WRIST_PITCH_L_pos: jointpos
              WRIST_YAW_L_pos: jointpos
              HEAD_YAW_pos: jointpos
              HEAD_PITCH_pos: jointpos
              # joint velocities
              HIP_YAW_R_vel: jointvel
              HIP_ROLL_R_vel: jointvel
              HIP_PITCH_R_vel: jointvel
              KNEE_PITCH_R_vel: jointvel
              ANKLE_PITCH_R_vel: jointvel
              ANKLE_ROLL_R_vel: jointvel
              HIP_YAW_L_vel: jointvel
              HIP_ROLL_L_vel: jointvel
              HIP_PITCH_L_vel: jointvel
              KNEE_PITCH_L_vel: jointvel
              ANKLE_PITCH_L_vel: jointvel
              ANKLE_ROLL_L_vel: jointvel
              SHOULDER_PITCH_R_vel: jointvel
              SHOULDER_ROLL_R_vel: jointvel
              SHOULDER_YAW_R_vel: jointvel
              ELBOW_PITCH_R_vel: jointvel
              ELBOW_YAW_R_vel: jointvel
              WRIST_PITCH_R_vel: jointvel
              WRIST_YAW_R_vel: jointvel
              SHOULDER_PITCH_L_vel: jointvel
              SHOULDER_ROLL_L_vel: jointvel
              SHOULDER_YAW_L_vel: jointvel
              ELBOW_PITCH_L_vel: jointvel
              ELBOW_YAW_L_vel: jointvel
              WRIST_PITCH_L_vel: jointvel
              WRIST_YAW_L_vel: jointvel
              HEAD_YAW_vel: jointvel
              HEAD_PITCH_vel: jointvel
    timers:
      - ros_parameter: timer_sensor_setting
        timer_period_sec: 0.01       # 100 Hz state publish
        callback_group: None

viz:
  on: false
  viz_nodes:
    - pkg: obelisk_viz_cpp
      executable: default_robot_viz
      robot_pkg: themis_description
      urdf: themis.urdf
      robot_topic: robot_description
      subscribers:
        - ros_parameter: sub_viz_est_setting
          topic: /obelisk/themis/est_state
          history_depth: 10
          callback_group: None
          non_obelisk: False
      publishers:
        - ros_parameter: pub_viz_joint_setting
          topic: joint_states
          history_depth: 10
          callback_group: None
      timers:
        - ros_parameter: timer_viz_joint_setting
          timer_period_sec: 0.02
          callback_group: None

joystick:
  on: True
  pub_topic: /obelisk/themis/joy
  sub_topic: /obelisk/themis/joy_feedback
